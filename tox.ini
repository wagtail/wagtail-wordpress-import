[tox]
skipsdist = True
usedevelop = True
skip_missing_interpreters = True

envlist = 
    python{3.9}-django{4.2}-wagtail{6.3,6.4,7.0}
    python{3.10,3.11,3.12}-django{4.2,5.1,5.2}-wagtail{6.3,6.4,7.0}
    python{3.13}-django{5.1,5.2}-wagtail{6.3,6.4,7.0}

[gh-actions]
python =
    3.9: python3.9
    3.10: python3.10
    3.11: python3.11
    3.12: python3.12
    3.13: python3.13

[testenv]
install_command = pip install -e ".[testing]" -U {opts} {packages}
commands = 
    coverage run testmanage.py test --deprecation all
    coverage report -m

basepython =
    python3.9: python3.9
    python3.10: python3.10
    python3.11: python3.11
    python3.12: python3.12
    python3.13: python3.13

deps =
    coverage

    django4.2: Django>=4.2,<4.3
    django5.1: Django>=5.1,<5.2
    django5.2: Django>=5.2,<5.3

    wagtail6.3: wagtail>=6.3,<6.4
    wagtail6.4: wagtail>=6.4,<6.5
    wagtail7.0: wagtail>=7.0,<7.1

    lxml: lxml>=5.3.0,<5.4
    bleach: bleach>=4.1.0,<5
    prettytable: prettytable>=3.16.0,<4
    shortcodes: shortcodes>=5.4.0,<6
    responses: responses>=0.25.7
    cached_property: cached-property>=2.0.1,<3
    html5lib: html5lib>=1.1,<2

[testenv:flake8]
basepython=python3.9
deps=flake8>=2.2.0
commands=flake8 wagtail_wordpress_import
